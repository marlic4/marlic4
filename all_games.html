<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Juegos Online</title>

<style>
body{
    margin:0;
    font-family:Arial;
}

#menu{
    width:250px;
    height:100vh;
    overflow-y:auto;
    background:#f0f0f0;
    position:fixed;
    left:0;
    top:0;
    padding:10px;
}

#menu button{
    width:100%;
    padding:10px;
    margin-bottom:5px;
    cursor:pointer;
}

#game{
    margin-left:250px;
    width:calc(100% - 250px);
    height:100vh;
    border:none;
}
</style>
</head>
<body>

<div id="menu">
    <button onclick="abrir('1.12.html')">Minecraft 1.12</button>
    <button onclick="abrir('1.8.html')">Minecraft 1.8</button>
    <button onclick="abrir('1.5.html')">Minecraft 1.5</button>
    <button onclick="abrir('2048.html')">2048</button>
    <button onclick="abrir('Alpha_1.2.6.html')">Minecraft Alpha</button>
    <button onclick="abrir('geometrydashlite.html')">Geometry Dash</button>
    <button onclick="abrir('slope.html')">Slope</button>
    <button onclick="abrir('slope2player.html')">Slope 2 Players</button>
    <button onclick="abrir('sm64.html')">Mario 64</button>
</div>

<iframe
    id="game"
    src="https://altf4.sbs/games/1.12.html">
</iframe>

<script>
function abrir(juego){
    document.getElementById("game").src =
        "https://altf4.sbs/games/" + juego;
}
</script>

</body>
</html>
