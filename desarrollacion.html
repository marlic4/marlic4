<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OptiMario</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:url("fondo.jpg") center center/cover no-repeat fixed;
    min-height:100vh;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    backdrop-filter:blur(8px);
    background:rgba(0,0,0,0.4);
}

.logo{
    position:fixed;
    top:15px;
    left:20px;
    color:#7fffd4;
    font-size:40px;
    font-weight:bold;
    z-index:10;
    text-shadow:0 0 10px cyan;
}

.buscador{
    position:fixed;
    top:15px;
    left:50%;
    transform:translateX(-50%);
    width:350px;
    z-index:10;
}

.buscador input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:15px;
    background:rgba(0,0,0,0.5);
    color:white;
}

.menu{
    position:fixed;
    top:80px;
    left:15px;
    width:220px;
    background:rgba(0,0,0,0.45);
    backdrop-filter:blur(10px);
    border-radius:15px;
    padding:10px;
    z-index:10;
}

.menu button{
    width:100%;
    padding:14px;
    margin:5px 0;
    border:none;
    border-radius:8px;
    background:transparent;
    color:white;
    font-size:18px;
    cursor:pointer;
}

.menu button:hover{
    background:rgba(255,255,255,0.15);
}

.activo{
    background:#2ecc71 !important;
    color:white;
}

.panel{
    position:absolute;
    top:120px;
    left:50%;
    transform:translateX(-50%);
    width:600px;
    background:rgba(0,0,0,0.45);
    backdrop-filter:blur(10px);
    border-radius:15px;
    padding:20px;
    color:white;
    z-index:10;
}

.programa{
    background:rgba(255,255,255,0.05);
    border-radius:10px;
    padding:15px;
    margin-top:15px;
}

.descargar{
    margin-top:10px;
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#2ecc71;
    color:white;
    cursor:pointer;
}

.descargar:hover{
    background:#27ae60;
}

/* MODALES */
.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.7);
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.caja{
    background:#1f1f1f;
    padding:20px;
    border-radius:12px;
    width:420px;
    color:white;
    text-align:center;
    position:relative;
}

.btn{
    margin:5px;
    padding:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.verde{
    background:#2ecc71;
    color:white;
}

.rojo{
    background:#e74c3c;
    color:white;
}

.x{
    position:absolute;
    top:10px;
    right:10px;
    width:35px;
    height:35px;
    border:none;
    border-radius:8px;
    background:#e74c3c;
    color:white;
    font-size:18px;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="logo">OPTIMARIO</div>

<div class="buscador">
<input type="text" placeholder="Buscar...">
</div>

<div class="menu">
    <button id="windows" class="activo" onclick="mostrarWindows()">🪟 Windows</button>
    <button id="linux" onclick="mostrarLinux()">🐧 Linux</button>
</div>

<div class="panel" id="contenido">
<h2>Windows</h2>

<div class="programa">
<h3>Programa de ejemplo</h3>
<p>Descripción del programa</p>

<button class="descargar" onclick="abrirModal('archivo.exe')">
Descargar
</button>
</div>

</div>

<!-- MODAL 1 -->
<div class="modal" id="modal1">
<div class="caja">

<h2>¿Seguro que quieres descargarlo?</h2>
<p>Si descargas este archivo no me hago responsable de virus o daños.</p>

<p id="timer">Continuar en 3...</p>

<button class="btn rojo" onclick="cerrar()">No continuar</button>
<button class="btn verde" id="continuar" onclick="siguiente()" disabled>Continuar</button>

</div>
</div>

<!-- MODAL 2 -->
<div class="modal" id="modal2">
<div class="caja">

<button class="x" onclick="cerrarModal2()">✕</button>

<h2>Descarga</h2>
<p>Pulsa descargar o usa tutorial si no sabes.</p>

<button class="btn verde" onclick="descargar()">⬇ Descargar</button>
<button class="btn" onclick="window.open('tutorial.html')">📘 Tutorial</button>

</div>
</div>

<script>

let link = "";
let time = 3;
let intervalo;

function quitarActivos(){
document.getElementById("windows").classList.remove("activo");
document.getElementById("linux").classList.remove("activo");
}

function mostrarWindows(){
quitarActivos();
document.getElementById("windows").classList.add("activo");

document.getElementById("contenido").innerHTML=`
<h2>Windows</h2>

<div class="programa">
<h3>Programa de ejemplo</h3>
<p>Descripción del programa</p>

<button class="descargar" onclick="abrirModal('archivo.exe')">
Descargar
</button>
</div>

<div class="programa">
<h3>Mariocraft</h3>
<p>Juego para Linux (solo en Linux)</p>
</div>
`;
}

function mostrarLinux(){
quitarActivos();
document.getElementById("linux").classList.add("activo");

document.getElementById("contenido").innerHTML=`
<h2>Linux</h2>

<div class="programa">
<h3>Programa Linux</h3>
<p>Descripción del programa</p>

<button class="descargar" onclick="abrirModal('archivo.AppImage')">
Descargar
</button>
</div>

<div class="programa">
<h3>Mariocraft</h3>
<p>Juego para Linux</p>

<button class="descargar" onclick="abrirModal('http://aledrive.sbs/api/public/dl/Td8uAm3M')">
Descargar
</button>
</div>
`;
}

function abrirModal(url){
link = url;
document.getElementById("modal1").style.display="flex";

time = 3;
document.getElementById("continuar").disabled=true;

clearInterval(intervalo);

intervalo = setInterval(()=>{
time--;
document.getElementById("timer").innerText="Continuar en "+time+"...";
if(time<=0){
clearInterval(intervalo);
document.getElementById("continuar").disabled=false;
document.getElementById("timer").innerText="Ya puedes continuar";
}
},1000);
}

function cerrar(){
document.getElementById("modal1").style.display="none";
}

function siguiente(){
document.getElementById("modal1").style.display="none";
document.getElementById("modal2").style.display="flex";
}

function cerrarModal2(){
document.getElementById("modal2").style.display="none";
}

function descargar(){
window.location.href = link;
}

</script>

</body>
</html>
