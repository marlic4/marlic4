<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OptiMario</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:url("fondo.jpg") center center/cover no-repeat fixed;
    min-height:100vh;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    backdrop-filter:blur(8px);
    background:rgba(0,0,0,0.4);
}

.logo{
    position:fixed;
    top:15px;
    left:20px;
    color:#7fffd4;
    font-size:40px;
    font-weight:bold;
    z-index:10;
    text-shadow:0 0 10px cyan;
}

.buscador{
    position:fixed;
    top:15px;
    left:50%;
    transform:translateX(-50%);
    width:350px;
    z-index:10;
}

.buscador input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:15px;
    background:rgba(0,0,0,0.5);
    color:white;
}

.menu{
    position:fixed;
    top:80px;
    left:15px;
    width:220px;
    background:rgba(0,0,0,0.45);
    backdrop-filter:blur(10px);
    border-radius:15px;
    padding:10px;
    z-index:10;
}

.menu button{
    width:100%;
    padding:14px;
    margin:5px 0;
    border:none;
    border-radius:8px;
    background:transparent;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.2s;
}

.menu button:hover{
    background:rgba(255,255,255,0.15);
}

.activo{
    background:#2ecc71 !important;
    color:white;
}

.panel{
    position:absolute;
    top:120px;
    left:50%;
    transform:translateX(-50%);
    width:600px;
    background:rgba(0,0,0,0.45);
    backdrop-filter:blur(10px);
    border-radius:15px;
    padding:20px;
    color:white;
    z-index:10;
}

.programa{
    background:rgba(255,255,255,0.05);
    border-radius:10px;
    padding:15px;
    margin-top:15px;
}

.programa h3{
    margin-bottom:8px;
}

.descargar{
    margin-top:10px;
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#2ecc71;
    color:white;
    cursor:pointer;
}

.descargar:hover{
    background:#27ae60;
}

</style>
</head>
<body>

<div class="logo">
OPTIMARIO
</div>

<div class="buscador">
<input type="text" placeholder="Buscar...">
</div>

<div class="menu">
    <button id="windows" class="activo" onclick="mostrarWindows()">🪟 Windows</button>
    <button id="linux" onclick="mostrarLinux()">🐧 Linux</button>
</div>

<div class="panel" id="contenido">

    <h2>Windows</h2>

    <div class="programa">
        <h3>Programa de ejemplo</h3>
        <p>Descripción del programa.</p>

        <button class="descargar"
        onclick="window.location.href='archivo.exe'">
            Descargar
        </button>
    </div>

</div>

<script>

function quitarActivos(){
    document.getElementById("windows").classList.remove("activo");
    document.getElementById("linux").classList.remove("activo");
}

function mostrarWindows(){

    quitarActivos();
    document.getElementById("windows").classList.add("activo");

    document.getElementById("contenido").innerHTML = `
        <h2>Windows</h2>

        <div class="programa">
            <h3>Programa de ejemplo</h3>
            <p>Descripción del programa.</p>

            <button class="descargar"
            onclick="window.location.href='archivo.exe'">
                Descargar
            </button>
        </div>
    `;
}

function mostrarLinux(){

    quitarActivos();
    document.getElementById("linux").classList.add("activo");

    document.getElementById("contenido").innerHTML = `
        <h2>Linux</h2>

        <div class="programa">
            <h3>Programa Linux</h3>
            <p>Descripción del programa.</p>

            <button class="descargar"
            onclick="window.location.href='archivo.AppImage'">
                Descargar
            </button>
        </div>
    `;
}

</script>

</body>
</html>
